<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>条件单流程图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #333;
        }
        .flow-container {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 1rem;
            margin-top: 1rem;
            overflow-x: auto;
        }
        .flow-img {
            max-width: none;
            width: 100%;
            height: auto;
            display: block;
        }
        .section {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,.05);
            padding: 1rem;
            margin-top: 1rem;
        }
        .section-title {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: .5rem;
            font-size: 1rem;
        }
        .state-svg .node {
            fill: #ffffff;
            stroke: #cbd5e1;
            stroke-width: 1.5;
            rx: 8;
            ry: 8;
            filter: none;
        }
        .state-svg .label {
            fill: #111827;
            font-size: 14px;
        }
        .state-svg .hint {
            fill: #ef4444;
            font-size: 13px;
        }
        .state-svg .arrow {
            stroke: #94a3b8;
            stroke-width: 1.5;
            fill: none;
        }
        .nav-back-btn {
            position: fixed;
            top: 20px;
            left: -10px;
            z-index: 100;
            background: #1a7af8;
            color: white;
            padding: 6px 16px 6px 24px;
            border-radius: 0 20px 20px 0;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 2px 10px rgba(26, 122, 248, 0.3);
            text-decoration: none;
            transition: all 0.2s;
        }
        .nav-back-btn:hover {
            left: 0;
            background: #0056b3;
        }
    </style>
</head>
<body class="min-h-screen max-w-2xl mx-auto px-4 py-6">

    <a href="nav.html" class="nav-back-btn">
        <i class="fa-solid fa-house mr-1"></i> 返回导航
    </a>

    <header class="flex items-center mb-6">
        <a href="nav.html" class="text-gray-800 mr-4">
            <i class="fa-solid fa-arrow-left text-lg"></i>
        </a>
        <h1 class="text-xl font-bold text-gray-900">条件单流程图</h1>
    </header>

    <main>
        <div class="section">
            <div class="section-title">业务流程图</div>
            <div class="flow-container">
                <img id="businessFlowImg" src="assets/business-flow.png" alt="条件单流程图" class="flow-img" onerror="showUploadHint()">
                <div id="uploadHint" class="text-gray-400 text-sm mt-2 hidden">
                    未能加载流程图。请将图片保存为 <span class="font-mono text-gray-600">assets/business-flow.png</span>，
                    或点击下方按钮从本地选择图片进行预览（仅本地显示，不会上传）。若仍无法查看，可在新标签页打开外链：
                    <a href="http://axure.linksoft.cn/PBMMGD/#id=jj2eus&p=%E6%9D%A1%E4%BB%B6%E5%8D%95%E6%B5%81%E7%A8%8B" target="_blank" rel="noopener noreferrer" class="text-blue-600 underline">Axure 版本</a>
                </div>
                <div class="mt-3">
                    <label class="inline-flex items-center px-3 py-1.5 rounded-lg text-sm bg-blue-50 text-blue-600 border border-blue-100 cursor-pointer hover:bg-blue-100">
                        <i class="fa-solid fa-image mr-2"></i> 从本地选择图片
                        <input id="localFlowInput" type="file" accept="image/*" class="hidden" onchange="previewLocal(event)">
                    </label>
                    <a href="http://axure.linksoft.cn/PBMMGD/#id=jj2eus&p=%E6%9D%A1%E4%BB%B6%E5%8D%95%E6%B5%81%E7%A8%8B" target="_blank" rel="noopener noreferrer" class="ml-3 inline-flex items-center px-3 py-1.5 rounded-lg text-sm bg-white text-blue-600 border border-blue-100 hover:bg-blue-50">
                        <i class="fa-solid fa-arrow-up-right-from-square mr-2"></i> 在新标签页打开外链
                    </a>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">条件单状态流转图</div>
            <div class="flow-container">
                <svg class="state-svg" viewBox="0 0 900 520" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"></path>
                        </marker>
                    </defs>
                    <text x="40" y="40" class="label" style="fill:#475569;font-weight:600;">初始状态</text>

                    <rect x="60" y="80" width="140" height="64" class="node"></rect>
                    <text x="130" y="120" text-anchor="middle" class="label">监控中</text>

                    <rect x="560" y="80" width="140" height="64" class="node"></rect>
                    <text x="630" y="120" text-anchor="middle" class="label">已触发</text>

                    <rect x="560" y="220" width="140" height="64" class="node"></rect>
                    <text x="630" y="260" text-anchor="middle" class="label">已失效</text>

                    <rect x="560" y="360" width="140" height="64" class="node"></rect>
                    <text x="630" y="400" text-anchor="middle" class="label">已撤销</text>

                    <path d="M200 112 H 550" class="arrow" marker-end="url(#arrow)"></path>
                    <text x="380" y="100" class="hint" text-anchor="middle">满足监听条件并挂单</text>

                    <path d="M130 144 V 252 H 560" class="arrow" marker-end="url(#arrow)"></path>
                    <text x="270" y="240" class="hint">当天收盘后</text>

                    <path d="M130 144 V 392 H 560" class="arrow" marker-end="url(#arrow)"></path>
                    <text x="220" y="388" class="hint">用户主动撤销</text>
                </svg>
            </div>
        </div>
    </main>
    <script>
        function showUploadHint() {
            const hint = document.getElementById('uploadHint');
            if (hint) hint.classList.remove('hidden');
        }
        function previewLocal(e) {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const img = document.getElementById('businessFlowImg');
            img.src = url;
            const hint = document.getElementById('uploadHint');
            if (hint) hint.classList.add('hidden');
        }
    </script>

    <footer class="mt-10 text-center text-gray-400 text-xs pb-10">
        <p>© 2026 原型设计管理中心</p>
    </footer>

</body>
</html>
